    footerNote: '\u7075\u7280\u53E3\u7891\u6570\u636E\u6765\u6E90\u4E8E\u5C0F\u7EA2\u4E66\u7075\u7280\u5E73\u53F0\uFF0Cbrand_id=455795\uFF08\u5C0F\u7C73\u6C7D\u8F66\uFF09\uFF0CSU7 SPU_ID=1828496\uFF08\u8F7F\u8F66\u7C7B\u76EE\uFF09\uFF0CYU7 SPU_ID=1666370\uFF08SUV\u7C7B\u76EE\uFF09\uFF1B\u8BC4\u8BBA\u533A\u6570\u636E\u5F85RedBI\u8865\u5145\uFF08\u6570\u636E\u5468\u671F2026-05-12\u81F32026-05-18\uFF09\u3002NPS\u53CA\u8BCD\u4E91\u5F85momo\u8865\u5145\u540E\u66F4\u65B0\u3002'
  },

];

// ============================================================
// 渲染引擎
// ============================================================
const RC = { low:'risk-low', mid:'risk-mid', midhi:'risk-midhi', hi:'risk-hi' };
const RL = { low:'\u1F7E2 \u4F4E', mid:'\u1F7E1 \u4E2D', midhi:'\u1F7E0 \u4E2D\u9AD8', hi:'\u1F534 \u9AD8' };
const RBC = { low:'#FF6900', mid:'#CC5500', midhi:'#803000', hi:'#1A1A1A' };

let ch1=null, ch2=null;

function renderWeekBtns(){
  const sw=document.getElementById('weekSwitcher');
  sw.innerHTML='<span class="week-switcher-label">\u5207\u6362\u5468\u671F</span>';
  WEEKS.forEach((w,i)=>{
    const b=document.createElement('button');
    b.className='week-btn'+(i===WEEKS.length-1?' active':'');
    b.textContent=w.label;
    b.onclick=()=>{ document.querySelectorAll('.week-btn').forEach(x=>x.classList.remove('active')); b.classList.add('active'); render(w); };
    sw.appendChild(b);
  });
}

const EMPTY_PLACEHOLDER = `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:16px;color:#AAAAAA;">
  <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.4"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
  <div style="font-size:16px;font-weight:600;color:#BBBBBB;">\u6570\u636E\u66F4\u65B0\u4E2D</div>
</div>`;

function isEmpty(w){ return w.statsV2.su7.comments === '-'; }

function render(w){
  if(ch1){try{ch1.dispose();}catch(e){}} if(ch2){try{ch2.dispose();}catch(e){}}

  // 空数据周期：只显示总览骨架 + 占位提示
  if(isEmpty(w)){
    document.getElementById('mainContent').innerHTML=`
      ${sec('\u1F4CA','\u4E00\u3001\u6838\u5FC3\u6570\u636E\u603B\u89C8',statsH(w))}
      <div class="section">${EMPTY_PLACEHOLDER}</div>
    `;
    document.getElementById('footerArea').innerHTML=`\u5C0F\u7EA2\u4E66\u6C7D\u8F66\u5546\u4E1A\u5316\u54C1\u724C\u8425\u9500\u8FD0\u8425`;
    return;
  }

  document.getElementById('mainContent').innerHTML=`

    ${sec('\u1F4CA','\u4E00\u3001\u6838\u5FC3\u6570\u636E\u603B\u89C8',statsH(w))}
    ${sec('\u1F4AC','\u4E8C\u3001\u8BC4\u8BBA\u60C5\u611F\u5206\u5E03',chartsH())}
    ${sec('\u2601\uFE0F','\u4E09\u3001\u53E3\u7891\u5173\u952E\u8BCD\u8BCD\u4E91',wordcloudH(w))}
    ${sec('\u1F9E9','\u56DB\u3001\u5C5E\u6027\u7EF4\u5EA6\u60C5\u611F\u5206\u6790',attrH(w))}
    ${sec('\u1F525','\u4E94\u3001\u8BC4\u8BBA\u533A\u9AD8\u70ED\u8BDD\u9898',topicsH(w))}
    ${sec('\u1F4DD','\u516D\u3001\u7B14\u8BB0\u53E3\u7891\u8BE6\u60C5',notesH(w))}
    ${sec('\u1F6A8','\u4E03\u3001\u6838\u5FC3\u8206\u60C5\u4E8B\u4EF6 Top3',eventsH(w))}
    ${sec('\u1F465','\u516B\u3001\u7528\u6237\u753B\u50CF\u5206\u6790',portraitH(w))}

  `;
  document.getElementById('footerArea').innerHTML=`\u5C0F\u7EA2\u4E66\u6C7D\u8F66\u5546\u4E1A\u5316\u54C1\u724C\u8425\u9500\u8FD0\u8425`;
  setTimeout(()=>{
    ch1=echarts.init(document.getElementById('chart-su7'));
    ch2=echarts.init(document.getElementById('chart-yu7'));
    const po=(data)=>({
      backgroundColor:'transparent',
      tooltip:{trigger:'item',backgroundColor:'#fff',borderColor:'#E8E6E1',textStyle:{color:'#1A1A1A',fontSize:12},formatter:'{b}: {c}\u6761 ({d}%)'},
      legend:{orient:'vertical',right:'4%',top:'center',textStyle:{color:'#555',fontSize:12},icon:'circle'},
      series:[{type:'pie',radius:['46%','70%'],center:['35%','50%'],avoidLabelOverlap:false,label:{show:false},
        emphasis:{label:{show:true,fontSize:13,fontWeight:'bold',color:'#1A1A1A'}},data}]
    });
    const s=w.sentiment;
    ch1.setOption(po([
      {value:s.su7.pos,name:`\u6B63\u5411 ${s.su7.posP}%`,itemStyle:{color:'#FF6900'}},
      {value:s.su7.neg,name:`\u8D1F\u5411 ${s.su7.negP}%`,itemStyle:{color:'#1A1A1A'}},
      {value:s.su7.neu,name:`\u4E2D\u6027 ${s.su7.neuP}%`,itemStyle:{color:'#D9D9D9'}},
    ]));
    ch2.setOption(po([
      {value:s.yu7.pos,name:`\u6B63\u5411 ${s.yu7.posP}%`,itemStyle:{color:'#FF6900'}},
      {value:s.yu7.neg,name:`\u8D1F\u5411 ${s.yu7.negP}%`,itemStyle:{color:'#1A1A1A'}},
      {value:s.yu7.neu,name:`\u4E2D\u6027 ${s.yu7.neuP}%`,itemStyle:{color:'#D9D9D9'}},
    ]));
    window.addEventListener('resize',()=>{ch1&&ch1.resize();ch2&&ch2.resize();});
    // 词云：图片模式，由 Playwright 自动抓取后填入 keywords.su7/yu7.recommend/complain
  },80);
}

function sec(ic,title,body){return`<div class="section"><div class="section-title"><div class="ic">${ic}</div>${title}</div>${body}</div>`;}

function npsTag(v,change){
  if(v==null) return '';
  const arrow = change==null ? '' : change>=0
    ? `<span style="color:#FF6900;font-size:11px;font-weight:600;margin-left:6px">\u25B2 +${Math.abs(change).toFixed(1)}%</span>`
    : `<span style="color:#1A1A1A;font-size:11px;font-weight:600;margin-left:6px">\u25BC ${Math.abs(change).toFixed(1)}%</span>`;
  return `<div class="stat-metric nps-metric">
    <div class="stat-label">\u7B14\u8BB0 NPS</div>
    <div class="stat-value" style="font-size:22px">${v}${arrow}</div>
    <div class="stat-sub">\u8F83\u4E0A\u5468\u671F\u73AF\u6BD4</div>
  </div>`;
}
function statsH(w){
  const s=w.statsV2;
  return`<div class="stats-grid">
    <div class="stat-panel su7">
      <div class="stat-panel-header">
        <span class="model-badge">SU7</span>
        <span class="model-desc">\u8F7F\u8F66\u7C7B\u76EE</span>
      </div>
      <div class="stat-metrics">
        <div class="stat-metric"><div class="stat-label">\u672C\u5468\u65B0\u589E\u8BC4\u8BBA</div><div class="stat-value">${s.su7.comments}</div><div class="stat-sub">${s.su7.commentsSub}</div></div>
        <div class="stat-metric"><div class="stat-label">\u6D89\u53CA\u7B14\u8BB0\u6570</div><div class="stat-value">${s.su7.notes}</div><div class="stat-sub">${s.su7.notesSub}</div></div>
        <div class="stat-metric"><div class="stat-label">\u8BC4\u8BBA\u66DD\u5149\u91CF</div><div class="stat-value">${s.su7.exposure}</div><div class="stat-sub">${s.su7.exposureSub}</div></div>
        ${npsTag(s.su7.nps, s.su7.npsChange)}
      </div>
    </div>
    <div class="stat-panel yu7">
      <div class="stat-panel-header">
        <span class="model-badge">YU7</span>
        <span class="model-desc">SUV \u7C7B\u76EE</span>
      </div>
      <div class="stat-metrics">
        <div class="stat-metric"><div class="stat-label">\u672C\u5468\u65B0\u589E\u8BC4\u8BBA</div><div class="stat-value">${s.yu7.comments}</div><div class="stat-sub">${s.yu7.commentsSub}</div></div>
        <div class="stat-metric"><div class="stat-label">\u6D89\u53CA\u7B14\u8BB0\u6570</div><div class="stat-value">${s.yu7.notes}</div><div class="stat-sub">${s.yu7.notesSub}</div></div>
        <div class="stat-metric"><div class="stat-label">\u8BC4\u8BBA\u66DD\u5149\u91CF</div><div class="stat-value">${s.yu7.exposure}</div><div class="stat-sub">${s.yu7.exposureSub}</div></div>
        ${npsTag(s.yu7.nps, s.yu7.npsChange)}
      </div>
    </div>
  </div>`;
}

function chartsH(){return`<div class="charts-row"><div class="chart-card"><div class="chart-card-title"><span class="cdot" style="background:#FF6900"></span> SU7 \u60C5\u611F\u5206\u5E03</div><div class="chart-wrap" id="chart-su7"></div></div><div class="chart-card"><div class="chart-card-title"><span class="cdot" style="background:#1677FF"></span> YU7 \u60C5\u611F\u5206\u5E03</div><div class="chart-wrap" id="chart-yu7"></div></div></div>`;}

function wcImgCard(label, cls, imgUrl){
  const inner = imgUrl
    ? `<div class="wc-img-wrap"><img src="${imgUrl}" alt="${label}\u8BCD\u4E91" /></div>`
    : `<div class="wc-placeholder">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M8 12h8M12 8v8"/></svg>
        <span>\u8BCD\u4E91\u56FE\u5C06\u5728\u4E0B\u5468\u81EA\u52A8\u66F4\u65B0</span>
      </div>`;
  return `<div class="wc-img-card">
    <div class="wc-img-label ${cls}">${cls==='recommend'?'\u1F44D \u63A8\u8350\u5173\u952E\u8BCD':'\u1F4AC \u5410\u69FD\u5173\u952E\u8BCD'}</div>
    ${inner}
  </div>`;
}

function wordcloudH(w){
  const kw = w.keywords || {};
  const su7 = kw.su7 || {};
  const yu7 = kw.yu7 || {};
  return `<div class="wordcloud-row">
    <div class="wc-model-block">
      <div class="wc-model-header"><span class="cdot" style="background:#FF6900"></span>SU7 \u7B14\u8BB0\u8BCD\u4E91</div>
      <div class="wc-pair">
        ${wcImgCard('\u63A8\u8350','recommend', su7.recommend||null)}
        ${wcImgCard('\u5410\u69FD','complain', su7.complain||null)}
      </div>
    </div>
    <div class="wc-model-block">
      <div class="wc-model-header"><span class="cdot" style="background:#1677FF"></span>YU7 \u7B14\u8BB0\u8BCD\u4E91</div>
      <div class="wc-pair">
        ${wcImgCard('\u63A8\u8350','recommend', yu7.recommend||null)}
        ${wcImgCard('\u5410\u69FD','complain', yu7.complain||null)}
      </div>
    </div>
  </div>`;
}

function attrH(w){
  const rows=(attrs)=>attrs.map(a=>`<div class="attr-row"><div class="attr-name">${a.name}</div><div class="attr-bar-bg"><div class="attr-bar" style="width:${Math.max(a.pct,.5)}%;background:${RBC[a.risk]}"></div></div><div class="attr-pct">${a.pct}%</div><div class="risk ${RC[a.risk]}">${RL[a.risk]}</div></div>`).join('');
  return`<div class="attr-grid"><div class="attr-card"><div class="attr-header"><span style="color:#FF6900;font-size:10px">\u25CF</span> SU7\uFF08\u8F7F\u8F66\u7C7B\u76EE\uFF09</div>${rows(w.su7Attrs)}</div><div class="attr-card"><div class="attr-header"><span style="color:#1677FF;font-size:10px">\u25CF</span> YU7\uFF08SUV \u7C7B\u76EE\uFF09</div>${rows(w.yu7Attrs)}</div></div>`;
}

function topicsH(w){
  const tr=(ts,isSu7)=>ts.map(t=>`<div class="topic-item"><div class="topic-pct${isSu7?'':' yu7-c'}">${t.pct}</div><div><div class="topic-name">${t.name}<span class="stag ${t.sentiment}">${t.sLabel}</span></div><div class="topic-quote">\u300C${t.quote}\u300D</div><div class="topic-meta"><span>\u1F44D ${t.like.toLocaleString()}</span><span>\u1F441 ${t.view.toLocaleString()}</span></div></div></div>`).join('');
  return`<div class="topics-grid"><div class="topic-card"><div class="topic-header"><span class="topic-header-dot" style="background:#FF6900"></span> SU7 \u9AD8\u70ED\u8BDD\u9898</div>${tr(w.su7Topics,true)}</div><div class="topic-card"><div class="topic-header"><span class="topic-header-dot" style="background:#1677FF"></span> YU7 \u9AD8\u70ED\u8BDD\u9898</div>${tr(w.yu7Topics,false)}</div></div>`;
}

function notesH(w){
  const nc=(ns,isNeg)=>ns.map(n=>`<div class="note-card${isNeg?' neg':''}"><span class="nc-tag ${n.model}-tag">${n.model.toUpperCase()}</span>${isNeg?`<span class="risk-flag risk ${RC[n.risk]}">${n.riskLabel}</span>`:''}<div class="nc-title">${n.title}</div><div class="nc-quote">\u300C${n.quote}\u300D</div><div class="nc-meta"><span>\u1F44D <strong>${n.like.toLocaleString()}</strong></span><span>\u1F441 <strong>${n.view.toLocaleString()}</strong></span></div><div class="nc-insight">\u1F4A1 ${n.insight}</div><a href="${n.url}" target="_blank" class="nc-link">\u1F4D6 \u67E5\u770B\u7B14\u8BB0 \u2192</a></div>`).join('');
  return`<div class="notes-section-title">\u2705 \u6B63\u5411\u53E3\u7891\u4EAE\u70B9</div><div class="notes-grid">${nc(w.posNotes,false)}</div><div class="notes-section-title" style="margin-top:24px">\u26A0\uFE0F \u8D1F\u5411\u98CE\u9669\u9884\u8B66</div><div class="notes-grid">${nc(w.negNotes,true)}</div>`;
}

function eventsH(w){return w.events.map(e=>`<div class="event-card ${e.type}"><div class="event-hd"><span>${e.emoji}</span><strong>${e.title}</strong></div><div class="event-body">${e.body}</div><a href="${e.url}" target="_blank" class="event-link">\u1F4D6 \u67E5\u770B\u76F8\u5173\u7B14\u8BB0 \u2192</a></div>`).join('');}

function portraitH(w){
  const pc=(label,color,d)=>`<div class="portrait-card"><div class="portrait-title"><span style="color:${color};font-size:10px">\u25CF</span> ${label}</div><div class="prow"><div class="plabel">\u6027\u522B\u5206\u5E03</div><div class="pbrow"><div class="pblabel">\u7537\u6027</div><div class="pbbg"><div class="pbfill" style="width:${d.maleP}%;background:${color}"></div></div><div class="pbpct">${d.maleP}%</div></div><div class="pbrow"><div class="pblabel">\u5973\u6027</div><div class="pbbg"><div class="pbfill" style="width:${d.femaleP}%;background:${color}55"></div></div><div class="pbpct">${d.femaleP}%</div></div></div><div class="prow"><div class="plabel">\u5E74\u9F84\u5206\u5E03\uFF08Top2\uFF09</div>${d.ages.map(a=>`<div class="pbrow"><div class="pblabel">${a.label}</div><div class="pbbg"><div class="pbfill" style="width:${Math.round(a.val/a.max*100)}%;background:${color}"></div></div><div class="pbpct">${a.val.toLocaleString()}条</div></div>`).join('')}</div><div class="prow"><div class="plabel">\u57CE\u5E02\u5206\u5E03\uFF08Top2\uFF09</div>${d.cities.map(c=>`<div class="pbrow"><div class="pblabel">${c.label}</div><div class="pbbg"><div class="pbfill" style="width:${Math.round(c.val/c.max*100)}%;background:${color}"></div></div><div class="pbpct">${c.val.toLocaleString()}条</div></div>`).join('')}</div></div>`;
  return`<div class="portrait-grid">${pc('SU7 \u7528\u6237\u753B\u50CF','#FF6900',w.portrait.su7)}${pc('YU7 \u7528\u6237\u753B\u50CF','#1677FF',w.portrait.yu7)}</div><div class="info-box" style="margin-top:14px"><strong>\u1F4CC \u7EFC\u5408\u753B\u50CF\u5C0F\u7ED3</strong><br>SU7 & YU7 \u8BC4\u8BBA\u7528\u6237\u9AD8\u5EA6\u4E00\u81F4\uFF1A<strong>25-34\u5C81\u7537\u6027\u4E3A\u4E3B\uFF0C\u65B0\u4E00\u7EBF/\u4E00\u7EBF\u57CE\u5E02\u96C6\u4E2D\uFF0C\u672A\u5A5A\u6BD4\u4F8B\u9AD8\uFF0C\u4E2D\u6D88\u8D39\u6C34\u5E73\u4E3B\u5BFC</strong>\u3002\u4E24\u6B3E\u8F66\u578B\u8BA8\u8BBA\u4EBA\u7FA4\u753B\u50CF\u9AD8\u5EA6\u91CD\u5408\uFF0C\u53EF\u5171\u7528\u5185\u5BB9\u7B56\u7565\uFF1B\u5DEE\u5F02\u5728\u4E8E YU7 \u66F4\u591A\u5438\u5F15\u5173\u6CE8\u7A7A\u95F4/SUV \u8D5B\u9053\u7528\u6237\uFF0CSU7 \u66F4\u5F3A\u7684\u60C5\u611F\u8FDE\u63A5\u6765\u81EA\u96F7\u519B\u4E2A\u4EBAIP\u3002</div>`;
}

function actionH(w){
  const pr=w.proActions.map(a=>`<tr><td>${a.dim}</td><td>${a.lingxi}</td><td>${a.comment}</td><td>${a.action}</td></tr>`).join('');
  const rr=w.riskActions.map(a=>`<tr><td>${a.dim}</td><td><span class="risk ${RC[a.risk]}">${RL[a.risk]}</span></td><td><span class="utag ${a.urgency==='hi'?'u-hi':a.urgency==='mid'?'u-mid':'u-low'}">${a.uLabel}</span></td><td>${a.action}</td></tr>`).join('');
  return`<div class="action-label">\u2705 \u4F18\u52BF\u70B9\u2014\u2014\u53EF\u653E\u5927\u7684\u5185\u5BB9\u65B9\u5411</div><div class="atab-wrap" style="margin-bottom:22px"><table class="atab"><thead><tr><th>\u4F18\u52BF\u7EF4\u5EA6</th><th>\u7075\u7280\u6570\u636E\u652F\u6491</th><th>\u8BC4\u8BBA\u533A\u652F\u6491</th><th>\u5EFA\u8BAE\u52A8\u4F5C</th></tr></thead><tbody>${pr}</tbody></table></div><div class="action-label">\u26A0\uFE0F \u98CE\u9669\u70B9\u2014\u2014\u9700\u4F18\u5148\u5904\u7F6E</div><div class="atab-wrap"><table class="atab"><thead><tr><th>\u98CE\u9669\u7EF4\u5EA6</th><th>\u98CE\u9669\u7B49\u7EA7</th><th>\u7D27\u6025\u7A0B\u5EA6</th><th>\u5EFA\u8BAE\u884C\u52A8</th></tr></thead><tbody>${rr}</tbody></table></div>`;
}

renderWeekBtns();
render(WEEKS[WEEKS.length-1]);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小米汽车 SU7+YU7 口碑舆情周报</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts-wordcloud@2.1.0/dist/echarts-wordcloud.min.js"></script>
<style>
@font-face {
  font-family: 'MiSans';
  src: url('https://cdn.jsdelivr.net/npm/misans@4.0.0/lib/Normal/MiSans-Regular.woff2') format('woff2');
  font-weight: 400; font-display: swap;
}
@font-face {
  font-family: 'MiSans';
  src: url('https://cdn.jsdelivr.net/npm/misans@4.0.0/lib/Normal/MiSans-Medium.woff2') format('woff2');
  font-weight: 500; font-display: swap;
}
@font-face {
  font-family: 'MiSans';
  src: url('https://cdn.jsdelivr.net/npm/misans@4.0.0/lib/Normal/MiSans-Semibold.woff2') format('woff2');
  font-weight: 600; font-display: swap;
}
@font-face {
  font-family: 'MiSans';
  src: url('https://cdn.jsdelivr.net/npm/misans@4.0.0/lib/Normal/MiSans-Bold.woff2') format('woff2');
  font-weight: 700; font-display: swap;
}

:root {
  --mi-orange: #FF6900;
  --mi-orange-light: #FFF0E6;
  --mi-orange-mid: #FFD9BF;
  --bg: #F7F6F3;
  --bg-card: #FFFFFF;
  --bg-card2: #F9F8F6;
  --bg-section: #F2F1EE;
  --text-primary: #1A1A1A;
  --text-secondary: #555555;
  --text-muted: #999999;
  --green: #FF6900;
  --green-bg: #FFF0E6;
  --yellow: #8C6B00;
  --yellow-bg: #FFF8E6;
  --orange-risk: #CC4A00;
  --orange-bg: #FFE8D6;
  --red: #1A1A1A;
  --red-bg: #F5F5F5;
  --blue: #1677FF;
  --border: #E8E6E1;
  --border-light: #F0EEE9;
  --su7: #FF6900;
  --yu7: #1677FF;
  --shadow: 0 1px 4px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
  --shadow-hover: 0 4px 12px rgba(0,0,0,0.1), 0 8px 28px rgba(0,0,0,0.07);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'MiSans', 'PingFang SC', -apple-system, 'Helvetica Neue', sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── HEADER ── */
.header {
  background: #FFFFFF;
  border-bottom: 1px solid var(--border);
  padding: 0 56px;
}
.header-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 36px 0 28px;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 24px;
  flex-wrap: wrap;
}
.header-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}
.mi-logo { display: block; }
.header-tag {
  font-size: 11px;
  color: var(--text-muted);
  border: 1px solid var(--border);
  padding: 2px 8px;
  border-radius: 20px;
  font-weight: 500;
}
.header h1 {
  font-size: 26px;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: -0.3px;
  margin-bottom: 6px;
  line-height: 1.3;
}
.header h1 em {
  font-style: normal;
  color: var(--mi-orange);
}
.header-sub {
  font-size: 12px;
  color: var(--text-muted);
  font-weight: 400;
}

/* ── WEEK SWITCHER ── */
.week-switcher {
  display: flex;
  align-items: center;
  gap: 6px;
  padding-top: 6px;
  flex-wrap: wrap;
}
.week-switcher-label {
  font-size: 14px;
  color: var(--text-muted);
  font-weight: 600;
  margin-right: 6px;
}
.week-btn {
  padding: 10px 22px;
  border-radius: 24px;
  font-size: 15px;
  font-weight: 600;
  font-family: 'MiSans', sans-serif;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--bg-card2);
  color: var(--text-secondary);
  transition: all .18s;
}
.week-btn:hover {
  border-color: var(--mi-orange);
  color: var(--mi-orange);
  background: var(--mi-orange-light);
}
.week-btn.active {
  background: var(--mi-orange);
  color: #fff;
  border-color: var(--mi-orange);
  font-weight: 600;
}

/* ── MAIN ── */
.main { max-width: 1200px; margin: 0 auto; padding: 32px 56px 80px; }

.section { margin-bottom: 48px; }
.section-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 18px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  letter-spacing: -0.1px;
}
.section-title .ic {
  width: 26px; height: 26px;
  background: var(--mi-orange-light);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
}
.section-title .num {
  font-size: 11px;
  color: var(--text-muted);
  font-weight: 400;
  border: 1px solid var(--border);
  padding: 1px 7px;
  border-radius: 10px;
  margin-left: auto;
}

/* ── STAT CARDS ── */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.stat-panel {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  box-shadow: var(--shadow);
}
.stat-panel-header {
  display: flex; align-items: center; gap: 10px;
  padding: 16px 24px 14px;
  border-bottom: 1px solid var(--border);
}
.stat-panel-header .model-badge {
  font-size: 13px; font-weight: 700;
  padding: 3px 12px; border-radius: 20px;
}
.stat-panel.su7 .stat-panel-header { border-top: 3px solid var(--su7); }
.stat-panel.yu7 .stat-panel-header { border-top: 3px solid var(--yu7); }
.su7 .model-badge { background: var(--mi-orange-light); color: var(--su7); }
.yu7 .model-badge { background: #EBF3FF; color: var(--yu7); }
.stat-panel-header .model-desc { font-size: 12px; color: var(--text-muted); }
.stat-metrics { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 0; }
.stat-metric {
  padding: 20px 24px;
  border-right: 1px solid var(--border-light);
}
.stat-metric:last-child { border-right: none; }
.stat-label { font-size: 11px; color: var(--text-muted); font-weight: 500; letter-spacing: .3px; margin-bottom: 8px; }
.stat-value { font-size: 22px; font-weight: 700; color: var(--text-primary); margin-bottom: 4px; letter-spacing: -0.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.stat-sub { font-size: 11px; color: var(--text-secondary); }
.model-tag { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px; margin-top: 8px; }
.su7-tag { background: var(--mi-orange-light); color: var(--su7); }
.yu7-tag { background: #EBF3FF; color: var(--yu7); }

/* ── CHARTS ── */
.charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.chart-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 22px 24px;
  box-shadow: var(--shadow);
}
.chart-card-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.cdot { width: 8px; height: 8px; border-radius: 50%; }
.chart-sub { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
.chart-wrap { width: 100%; height: 210px; }
.wordcloud-wrap { width: 100%; height: 260px; }
.wordcloud-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.wc-model-block { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 22px 24px; box-shadow: var(--shadow); }
.wc-model-header { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 16px; }
.wc-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.wc-img-card { background: #F7F8FA; border-radius: 10px; overflow: hidden; }
.wc-img-label { font-size: 12px; font-weight: 600; padding: 8px 14px 6px; display: flex; align-items: center; gap: 6px; }
.wc-img-label.recommend { color: #FF6900; }
.wc-img-label.complain { color: #1A1A1A; }
.wc-img-wrap { width: 100%; min-height: 200px; display: flex; align-items: center; justify-content: center; }
.wc-img-wrap img { width: 100%; display: block; border-radius: 0 0 10px 10px; }
.wc-placeholder { width: 100%; min-height: 200px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; color: #BBBBBB; font-size: 12px; }
.wc-placeholder svg { opacity: 0.3; }

/* ── ATTR ── */
.attr-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.attr-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  box-shadow: var(--shadow);
}
.attr-header {
  padding: 14px 20px;
  font-size: 13px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 7px;
  background: var(--bg-card2);
  border-bottom: 1px solid var(--border);
}
.attr-row {
  display: flex;
  align-items: center;
  padding: 9px 20px;
  border-bottom: 1px solid var(--border-light);
  gap: 10px;
}
.attr-row:last-child { border-bottom: none; }
.attr-name { flex: 1; font-size: 12px; color: var(--text-primary); font-weight: 500; }
.attr-bar-bg { flex: 2; background: var(--bg-section); border-radius: 4px; height: 6px; overflow: hidden; }
.attr-bar { height: 100%; border-radius: 4px; transition: width .4s ease; }
.attr-pct { font-size: 11px; font-weight: 600; color: var(--text-secondary); min-width: 40px; text-align: right; }
.risk { font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 600; min-width: 50px; text-align: center; }
.risk-low { background: #FFF0E6; color: #FF6900; }
.risk-mid { background: #FFE8D6; color: #CC5500; }
.risk-midhi { background: #F5E6DC; color: #803000; }
.risk-hi { background: #EBEBEB; color: #1A1A1A; font-weight: 700; }

/* ── TOPICS ── */
.topics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.topic-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  box-shadow: var(--shadow);
}
.topic-header {
  padding: 14px 20px;
  font-size: 13px;
  font-weight: 600;
  background: var(--bg-card2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
}
.topic-header-dot { width: 6px; height: 6px; border-radius: 50%; }
.topic-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 11px 20px;
  border-bottom: 1px solid var(--border-light);
  transition: background .15s;
}
.topic-item:hover { background: var(--bg-card2); }
.topic-item:last-child { border-bottom: none; }
.topic-pct {
  font-size: 14px;
  font-weight: 700;
  color: var(--su7);
  min-width: 40px;
  padding-top: 1px;
}
.topic-pct.yu7-c { color: var(--yu7); }
.topic-name { font-size: 12px; font-weight: 600; margin-bottom: 3px; color: var(--text-primary); }
.topic-quote { font-size: 11px; color: var(--text-secondary); line-height: 1.5; }
.topic-meta { display: flex; gap: 10px; margin-top: 4px; }
.topic-meta span { font-size: 10px; color: var(--text-muted); }
.stag { font-size: 10px; padding: 1px 6px; border-radius: 10px; font-weight: 600; margin-left: 5px; }
.pos { background: #FFF0E6; color: #FF6900; }
.neg { background: #EBEBEB; color: #1A1A1A; }
.neu { background: var(--bg-section); color: var(--text-muted); }

/* ── NOTE CARDS ── */
.notes-section-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  margin: 22px 0 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.notes-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.note-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  box-shadow: var(--shadow);
  transition: box-shadow .2s, transform .2s, border-color .2s;
  position: relative;
}
.note-card:hover {
  box-shadow: var(--shadow-hover);
  transform: translateY(-2px);
  border-color: var(--mi-orange-mid);
}
.note-card.neg:hover { border-color: #CCCCCC; }
.nc-tag { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 10px; margin-bottom: 8px; display: inline-block; }
.nc-title { font-size: 12px; font-weight: 600; margin-bottom: 6px; line-height: 1.4; color: var(--text-primary); }
.nc-quote {
  font-size: 11px;
  color: var(--text-secondary);
  border-left: 2px solid var(--mi-orange-mid);
  padding-left: 8px;
  margin-bottom: 9px;
  line-height: 1.6;
  font-style: italic;
}
.note-card.neg .nc-quote { border-left-color: #AAAAAA; }
.nc-meta { display: flex; gap: 12px; margin-bottom: 8px; }
.nc-meta span { font-size: 10px; color: var(--text-muted); }
.nc-meta strong { color: var(--text-secondary); }
.nc-insight {
  font-size: 11px;
  color: var(--text-secondary);
  background: var(--bg-section);
  border-radius: 6px;
  padding: 6px 8px;
  margin-bottom: 10px;
  line-height: 1.4;
}
.nc-link {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: var(--mi-orange-light);
  color: var(--mi-orange);
  text-decoration: none;
  font-size: 11px;
  font-weight: 600;
  padding: 5px 12px;
  border-radius: 20px;
  border: 1px solid var(--mi-orange-mid);
  transition: background .2s;
}
.nc-link:hover { background: var(--mi-orange-mid); }
.note-card.neg .nc-link { background: #EBEBEB; color: #333333; border-color: #CCCCCC; }
.note-card.neg .nc-link:hover { background: #DEDEDE; }
.risk-flag { position: absolute; top: 12px; right: 12px; font-size: 10px; padding: 2px 6px; border-radius: 8px; }

/* ── EVENTS ── */
.event-card {
  border-radius: 14px;
  padding: 20px 24px;
  margin-bottom: 12px;
  border: 1px solid transparent;
  box-shadow: var(--shadow);
}
.event-card.warn { background: #FFF8EE; border-color: #FFD9A0; }
.event-card.info { background: #FFF0E6; border-color: #FFB380; }
.event-card.danger { background: #F5F5F5; border-color: #CCCCCC; }
.event-hd { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.event-hd span { font-size: 20px; }
.event-hd strong { font-size: 14px; font-weight: 700; color: var(--text-primary); }
.event-body { font-size: 12px; color: var(--text-secondary); line-height: 1.8; }
.event-link {
  display: inline-flex; align-items: center; gap: 4px;
  color: var(--blue); text-decoration: none; font-size: 11px; font-weight: 500; margin-top: 8px;
}
.event-link:hover { text-decoration: underline; }

/* ── PORTRAIT ── */
.portrait-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.portrait-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 20px 24px;
  box-shadow: var(--shadow);
}
.portrait-title { font-size: 13px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 7px; }
.prow { margin-bottom: 14px; }
.plabel { font-size: 11px; color: var(--text-muted); font-weight: 500; margin-bottom: 6px; }
.pbrow { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
.pblabel { font-size: 11px; color: var(--text-secondary); min-width: 68px; }
.pbbg { flex: 1; background: var(--bg-section); border-radius: 4px; height: 7px; overflow: hidden; }
.pbfill { height: 100%; border-radius: 4px; transition: width .4s ease; }
.pbpct { font-size: 11px; color: var(--text-muted); min-width: 62px; text-align: right; }

/* ── ACTION TABLE ── */
.atab-wrap {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  box-shadow: var(--shadow);
}
.atab { width: 100%; border-collapse: collapse; font-size: 12px; }
.atab th {
  background: var(--bg-card2);
  color: var(--text-muted);
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .5px;
  padding: 10px 16px;
  text-align: left;
  border-bottom: 1px solid var(--border);
}
.atab td {
  padding: 11px 16px;
  border-bottom: 1px solid var(--border-light);
  color: var(--text-secondary);
  vertical-align: top;
  line-height: 1.6;
}
.atab tr:last-child td { border-bottom: none; }
.atab tr:hover td { background: var(--bg-card2); }
.atab td:first-child { color: var(--text-primary); font-weight: 500; }
.utag { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 600; }
.u-hi { background: #1A1A1A; color: #FFFFFF; }
.u-mid { background: #FF6900; color: #FFFFFF; }
.u-low { background: #FFE8D6; color: #803000; }

/* ── INFO BOX ── */
.info-box {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 18px 22px;
  font-size: 12px;
  color: var(--text-secondary);
  line-height: 1.8;
  box-shadow: var(--shadow);
}

/* ── DATA NOTE ── */
.data-note {
  background: #FFF8EE;
  border: 1px solid #FFD9A0;
  border-radius: 10px;
  padding: 10px 16px;
  font-size: 12px;
  color: #803000;
  margin-bottom: 18px;
  display: flex;
  align-items: flex-start;
  gap: 8px;
}

/* ── FOOTER ── */
.footer {
  background: var(--bg-card);
  border-top: 1px solid var(--border);
  padding: 24px 56px;
  font-size: 11px;
  color: var(--text-muted);
  line-height: 1.7;
}
.footer-inner { max-width: 1200px; margin: 0 auto; }

/* ── ACTION SECTION LABEL ── */
.action-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
  margin: 0 0 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-inner">

    const s=w.sentiment;
    ch1.setOption(po([
      {value:s.su7.pos,name:`正向 ${s.su7.posP}%`,itemStyle:{color:'#FF6900'}},
      {value:s.su7.neg,name:`负向 ${s.su7.negP}%`,itemStyle:{color:'#1A1A1A'}},
      {value:s.su7.neu,name:`中性 ${s.su7.neuP}%`,itemStyle:{color:'#D9D9D9'}},
    ]));
    ch2.setOption(po([
      {value:s.yu7.pos,name:`正向 ${s.yu7.posP}%`,itemStyle:{color:'#FF6900'}},
      {value:s.yu7.neg,name:`负向 ${s.yu7.negP}%`,itemStyle:{color:'#1A1A1A'}},
      {value:s.yu7.neu,name:`中性 ${s.yu7.neuP}%`,itemStyle:{color:'#D9D9D9'}},
    ]));
    window.addEventListener('resize',()=>{ch1&&ch1.resize();ch2&&ch2.resize();});
    // 词云：图片模式，由 Playwright 自动抓取后填入 keywords.su7/yu7.recommend/complain
  },80);
}

function sec(ic,title,body){return`<div class="section"><div class="section-title"><div class="ic">${ic}</div>${title}</div>${body}</div>`;}

function npsTag(v,change){
  if(v==null) return '';
  const arrow = change==null ? '' : change>=0
    ? `<span style="color:#FF6900;font-size:11px;font-weight:600;margin-left:6px">▲ +${Math.abs(change).toFixed(1)}%</span>`
    : `<span style="color:#1A1A1A;font-size:11px;font-weight:600;margin-left:6px">▼ ${Math.abs(change).toFixed(1)}%</span>`;
  return `<div class="stat-metric nps-metric">
    <div class="stat-label">笔记 NPS</div>
    <div class="stat-value" style="font-size:22px">${v}${arrow}</div>
    <div class="stat-sub">较上周期环比</div>
  </div>`;
}
function statsH(w){
  const s=w.statsV2;
  return`<div class="stats-grid">
    <div class="stat-panel su7">
      <div class="stat-panel-header">
        <span class="model-badge">SU7</span>
        <span class="model-desc">轿车类目</span>
      </div>
      <div class="stat-metrics">
        <div class="stat-metric"><div class="stat-label">本周新增评论</div><div class="stat-value">${s.su7.comments}</div><div class="stat-sub">${s.su7.commentsSub}</div></div>
        <div class="stat-metric"><div class="stat-label">涉及笔记数</div><div class="stat-value">${s.su7.notes}</div><div class="stat-sub">${s.su7.notesSub}</div></div>
        <div class="stat-metric"><div class="stat-label">评论曝光量</div><div class="stat-value">${s.su7.exposure}</div><div class="stat-sub">${s.su7.exposureSub}</div></div>
        ${npsTag(s.su7.nps, s.su7.npsChange)}
      </div>
    </div>
    <div class="stat-panel yu7">
      <div class="stat-panel-header">
        <span class="model-badge">YU7</span>
        <span class="model-desc">SUV 类目</span>
      </div>
      <div class="stat-metrics">
        <div class="stat-metric"><div class="stat-label">本周新增评论</div><div class="stat-value">${s.yu7.comments}</div><div class="stat-sub">${s.yu7.commentsSub}</div></div>
        <div class="stat-metric"><div class="stat-label">涉及笔记数</div><div class="stat-value">${s.yu7.notes}</div><div class="stat-sub">${s.yu7.notesSub}</div></div>
        <div class="stat-metric"><div class="stat-label">评论曝光量</div><div class="stat-value">${s.yu7.exposure}</div><div class="stat-sub">${s.yu7.exposureSub}</div></div>
        ${npsTag(s.yu7.nps, s.yu7.npsChange)}
      </div>
    </div>
  </div>`;
}

function chartsH(){return`<div class="charts-row"><div class="chart-card"><div class="chart-card-title"><span class="cdot" style="background:#FF6900"></span> SU7 情感分布</div><div class="chart-wrap" id="chart-su7"></div></div><div class="chart-card"><div class="chart-card-title"><span class="cdot" style="background:#1677FF"></span> YU7 情感分布</div><div class="chart-wrap" id="chart-yu7"></div></div></div>`;}

function wcImgCard(label, cls, imgUrl){
  const inner = imgUrl
    ? `<div class="wc-img-wrap"><img src="${imgUrl}" alt="${label}词云" /></div>`
    : `<div class="wc-placeholder">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M8 12h8M12 8v8"/></svg>
        <span>词云图将在下周自动更新</span>
      </div>`;
  return `<div class="wc-img-card">
    <div class="wc-img-label ${cls}">${cls==='recommend'?'👍 推荐关键词':'💬 吐槽关键词'}</div>
    ${inner}
  </div>`;
}

function wordcloudH(w){
  const kw = w.keywords || {};
  const su7 = kw.su7 || {};
  const yu7 = kw.yu7 || {};
  return `<div class="wordcloud-row">
    <div class="wc-model-block">
      <div class="wc-model-header"><span class="cdot" style="background:#FF6900"></span>SU7 笔记词云</div>
      <div class="wc-pair">
        ${wcImgCard('推荐','recommend', su7.recommend||null)}
        ${wcImgCard('吐槽','complain', su7.complain||null)}
      </div>
    </div>
    <div class="wc-model-block">
      <div class="wc-model-header"><span class="cdot" style="background:#1677FF"></span>YU7 笔记词云</div>
      <div class="wc-pair">
        ${wcImgCard('推荐','recommend', yu7.recommend||null)}
        ${wcImgCard('吐槽','complain', yu7.complain||null)}
      </div>
    </div>
  </div>`;
}

function attrH(w){
  const rows=(attrs)=>attrs.map(a=>`<div class="attr-row"><div class="attr-name">${a.name}</div><div class="attr-bar-bg"><div class="attr-bar" style="width:${Math.max(a.pct,.5)}%;background:${RBC[a.risk]}"></div></div><div class="attr-pct">${a.pct}%</div><div class="risk ${RC[a.risk]}">${RL[a.risk]}</div></div>`).join('');
  return`<div class="attr-grid"><div class="attr-card"><div class="attr-header"><span style="color:#FF6900;font-size:10px">●</span> SU7（轿车类目）</div>${rows(w.su7Attrs)}</div><div class="attr-card"><div class="attr-header"><span style="color:#1677FF;font-size:10px">●</span> YU7（SUV 类目）</div>${rows(w.yu7Attrs)}</div></div>`;
}

function topicsH(w){
  const tr=(ts,isSu7)=>ts.map(t=>`<div class="topic-item"><div class="topic-pct${isSu7?'':' yu7-c'}">${t.pct}</div><div><div class="topic-name">${t.name}<span class="stag ${t.sentiment}">${t.sLabel}</span></div><div class="topic-quote">「${t.quote}」</div><div class="topic-meta"><span>👍 ${t.like.toLocaleString()}</span><span>👁 ${t.view.toLocaleString()}</span></div></div></div>`).join('');
  return`<div class="topics-grid"><div class="topic-card"><div class="topic-header"><span class="topic-header-dot" style="background:#FF6900"></span> SU7 高热话题</div>${tr(w.su7Topics,true)}</div><div class="topic-card"><div class="topic-header"><span class="topic-header-dot" style="background:#1677FF"></span> YU7 高热话题</div>${tr(w.yu7Topics,false)}</div></div>`;
}

function notesH(w){
  const nc=(ns,isNeg)=>ns.map(n=>`<div class="note-card${isNeg?' neg':''}"><span class="nc-tag ${n.model}-tag">${n.model.toUpperCase()}</span>${isNeg?`<span class="risk-flag risk ${RC[n.risk]}">${n.riskLabel}</span>`:''}<div class="nc-title">${n.title}</div><div class="nc-quote">「${n.quote}」</div><div class="nc-meta"><span>👍 <strong>${n.like.toLocaleString()}</strong></span><span>👁 <strong>${n.view.toLocaleString()}</strong></span></div><div class="nc-insight">💡 ${n.insight}</div><a href="${n.url}" target="_blank" class="nc-link">📖 查看笔记 →</a></div>`).join('');
  return`<div class="notes-section-title">✅ 正向口碑亮点</div><div class="notes-grid">${nc(w.posNotes,false)}</div><div class="notes-section-title" style="margin-top:24px">⚠️ 负向风险预警</div><div class="notes-grid">${nc(w.negNotes,true)}</div>`;
}

function eventsH(w){return w.events.map(e=>`<div class="event-card ${e.type}"><div class="event-hd"><span>${e.emoji}</span><strong>${e.title}</strong></div><div class="event-body">${e.body}</div><a href="${e.url}" target="_blank" class="event-link">📖 查看相关笔记 →</a></div>`).join('');}

function portraitH(w){
  const pc=(label,color,d)=>`<div class="portrait-card"><div class="portrait-title"><span style="color:${color};font-size:10px">●</span> ${label}</div><div class="prow"><div class="plabel">性别分布</div><div class="pbrow"><div class="pblabel">男性</div><div class="pbbg"><div class="pbfill" style="width:${d.maleP}%;background:${color}"></div></div><div class="pbpct">${d.maleP}%</div></div><div class="pbrow"><div class="pblabel">女性</div><div class="pbbg"><div class="pbfill" style="width:${d.femaleP}%;background:${color}55"></div></div><div class="pbpct">${d.femaleP}%</div></div></div><div class="prow"><div class="plabel">年龄分布（Top2）</div>${d.ages.map(a=>`<div class="pbrow"><div class="pblabel">${a.label}</div><div class="pbbg"><div class="pbfill" style="width:${Math.round(a.val/a.max*100)}%;background:${color}"></div></div><div class="pbpct">${a.val.toLocaleString()}条</div></div>`).join('')}</div><div class="prow"><div class="plabel">城市分布（Top2）</div>${d.cities.map(c=>`<div class="pbrow"><div class="pblabel">${c.label}</div><div class="pbbg"><div class="pbfill" style="width:${Math.round(c.val/c.max*100)}%;background:${color}"></div></div><div class="pbpct">${c.val.toLocaleString()}条</div></div>`).join('')}</div></div>`;
  return`<div class="portrait-grid">${pc('SU7 用户画像','#FF6900',w.portrait.su7)}${pc('YU7 用户画像','#1677FF',w.portrait.yu7)}</div><div class="info-box" style="margin-top:14px"><strong>📌 综合画像小结</strong><br>SU7 & YU7 评论用户高度一致：<strong>25-34岁男性为主，新一线/一线城市集中，未婚比例高，中消费水平主导</strong>。两款车型讨论人群画像高度重合，可共用内容策略；差异在于 YU7 更多吸引关注空间/SUV 赛道用户，SU7 更强的情感连接来自雷军个人IP。</div>`;
}

function actionH(w){
  const pr=w.proActions.map(a=>`<tr><td>${a.dim}</td><td>${a.lingxi}</td><td>${a.comment}</td><td>${a.action}</td></tr>`).join('');
  const rr=w.riskActions.map(a=>`<tr><td>${a.dim}</td><td><span class="risk ${RC[a.risk]}">${RL[a.risk]}</span></td><td><span class="utag ${a.urgency==='hi'?'u-hi':a.urgency==='mid'?'u-mid':'u-low'}">${a.uLabel}</span></td><td>${a.action}</td></tr>`).join('');
  return`<div class="action-label">✅ 优势点——可放大的内容方向</div><div class="atab-wrap" style="margin-bottom:22px"><table class="atab"><thead><tr><th>优势维度</th><th>灵犀数据支撑</th><th>评论区支撑</th><th>建议动作</th></tr></thead><tbody>${pr}</tbody></table></div><div class="action-label">⚠️ 风险点——需优先处置</div><div class="atab-wrap"><table class="atab"><thead><tr><th>风险维度</th><th>风险等级</th><th>紧急程度</th><th>建议行动</th></tr></thead><tbody>${rr}</tbody></table></div>`;
}

renderWeekBtns();
render(WEEKS[WEEKS.length-1]);
</script>
